<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowthTrack - Habit & Skill Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js",
        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.1/firebase-analytics.js"
      }
    }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 222.2 84% 4.9%;
            --card: 0 0% 100%;
            --card-foreground: 222.2 84% 4.9%;
            --primary: 221.2 83.2% 53.3%;
            --primary-foreground: 210 40% 98%;
            --secondary: 210 40% 96.1%;
            --secondary-foreground: 222.2 47.4% 11.2%;
            --muted: 210 40% 96.1%;
            --muted-foreground: 215.4 16.3% 46.9%;
            --accent: 210 40% 96.1%;
            --accent-foreground: 222.2 47.4% 11.2%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 210 40% 98%;
            --border: 214.3 31.8% 91.4%;
            --input: 214.3 31.8% 91.4%;
            --ring: 221.2 83.2% 53.3%;
            --radius: 1rem;
        }
        .dark {
            --background: 222.2 84% 4.9%;
            --foreground: 210 40% 98%;
            --card: 222.2 84% 4.9%;
            --card-foreground: 210 40% 98%;
            --primary: 217.2 91.2% 59.8%;
            --primary-foreground: 222.2 47.4% 11.2%;
            --secondary: 217.2 32.6% 17.5%;
            --secondary-foreground: 210 40% 98%;
            --muted: 217.2 32.6% 17.5%;
            --muted-foreground: 215 20.2% 65.1%;
            --accent: 217.2 32.6% 17.5%;
            --accent-foreground: 210 40% 98%;
            --destructive: 0 62.8% 30.6%;
            --destructive-foreground: 210 40% 98%;
            --border: 217.2 32.6% 17.5%;
            --input: 217.2 32.6% 17.5%;
            --ring: 224.3 76.3% 48%;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            transition: background-color 0.3s, color 0.3s;
        }
        .bg-card { background-color: hsl(var(--card)); }
        .text-card-foreground { color: hsl(var(--card-foreground)); }
        .bg-primary { background-color: hsl(var(--primary)); }
        .text-primary-foreground { color: hsl(var(--primary-foreground)); }
        .bg-secondary { background-color: hsl(var(--secondary)); }
        .text-secondary-foreground { color: hsl(var(--secondary-foreground)); }
        .bg-accent { background-color: hsl(var(--accent)); }
        .text-accent-foreground { color: hsl(var(--accent-foreground)); }
        .bg-destructive { background-color: hsl(var(--destructive)); }
        .text-destructive-foreground { color: hsl(var(--destructive-foreground)); }
        .border-border { border-color: hsl(var(--border)); }
        .text-muted-foreground { color: hsl(var(--muted-foreground)); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: hsl(var(--muted)); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground)); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="flex min-h-screen"></div>
    <div id="support-fab-container"></div>
    <div id="modal-container" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/50 backdrop-blur-sm"></div>

    <script type="module">
    import { initializeApp } from 'firebase/app';
    import {
        getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider,
        signInWithEmailAndPassword, createUserWithEmailAndPassword,
        RecaptchaVerifier, signInWithPhoneNumber, signOut
    } from 'firebase/auth';
    import {
        getFirestore, doc, getDoc, setDoc, collection, onSnapshot,
        addDoc, updateDoc, deleteDoc, query, orderBy
    } from 'firebase/firestore';
    import { getAnalytics } from 'firebase/analytics';

    // ─── Firebase Config (inlined) ────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyB9ld7zIcOQxDlkM_DMaGnGo4FlpTmbZsM",
        authDomain: "growth-track-4fc9f.firebaseapp.com",
        projectId: "growth-track-4fc9f",
        storageBucket: "growth-track-4fc9f.firebasestorage.app",
        messagingSenderId: "567066574556",
        appId: "1:567066574556:web:15fc7df256ffc3c8da7e19",
        measurementId: "G-R66MM6K1JV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    try { getAnalytics(app); } catch (_) {}

    // ─── State ────────────────────────────────────────────────────────────────
    let state = {
        habits: [],
        skills: [],
        user: null,
        theme: localStorage.getItem('theme') || 'light',
        loading: true,
        error: null,
        needsProfile: false,
        supportOpen: false,
        showSuccess: false,
        suggestion: '',
        selectedHabitColor: '#3b82f6',
        selectedSkillColor: '#3b82f6',
        isPhoneSignup: false,
    };

    let activeTab = 'dashboard';
    let sidebarOpen = false;
    let loginMode = 'options'; // 'options'|'email-login'|'email-signup'|'phone'|'otp'
    let phoneConfirmation = null;
    let dailyQuote = '';

    const QUOTES = [
        "The secret of getting ahead is getting started.",
        "It does not matter how slowly you go as long as you do not stop.",
        "Everything you've ever wanted is on the other side of fear.",
        "Success is not final, failure is not fatal: it is the courage to continue that counts.",
        "Hardships often prepare ordinary people for an extraordinary destiny.",
        "Believe you can and you're halfway there.",
        "Your only limit is you.",
        "Don't stop until you're proud."
    ];

    const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

    const COUNTRIES = [
        { name: 'India', code: '+91', length: 10 },
        { name: 'USA', code: '+1', length: 10 },
        { name: 'UK', code: '+44', length: 10 },
        { name: 'Canada', code: '+1', length: 10 },
        { name: 'Australia', code: '+61', length: 9 }
    ];

    // ─── Theme ────────────────────────────────────────────────────────────────
    function applyTheme() {
        document.documentElement.classList.toggle('dark', state.theme === 'dark');
        localStorage.setItem('theme', state.theme);
    }

    // ─── Auth ─────────────────────────────────────────────────────────────────
    let habitsUnsub = null;
    let skillsUnsub = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDocRef = doc(db, 'users', user.uid);
            try {
                const snap = await getDoc(userDocRef);
                if (snap.exists()) {
                    const data = snap.data();
                    state = { ...state, user: { ...user, username: data.username || user.displayName || 'User' }, loading: false, needsProfile: false };
                    subscribeToData(user.uid);
                } else {
                    // New Google/Phone user without Firestore doc — prompt profile
                    state = { ...state, user, loading: false, needsProfile: true };
                }
            } catch (err) {
                state = { ...state, loading: false, error: 'Could not load your profile. Please refresh.' };
            }
        } else {
            if (habitsUnsub) { habitsUnsub(); habitsUnsub = null; }
            if (skillsUnsub) { skillsUnsub(); skillsUnsub = null; }
            state = { ...state, user: null, habits: [], skills: [], loading: false, needsProfile: false };
        }
        render();
    });

    function subscribeToData(uid) {
        if (habitsUnsub) habitsUnsub();
        if (skillsUnsub) skillsUnsub();

        const hq = query(collection(db, 'users', uid, 'habits'), orderBy('createdAt', 'desc'));
        habitsUnsub = onSnapshot(hq, (snap) => {
            state.habits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        }, (err) => { state.error = 'Failed to load habits: ' + err.message; render(); });

        const sq = query(collection(db, 'users', uid, 'skills'), orderBy('createdAt', 'desc'));
        skillsUnsub = onSnapshot(sq, (snap) => {
            state.skills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        }, (err) => { state.error = 'Failed to load skills: ' + err.message; render(); });
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function formatDate(d) { return d.toISOString().split('T')[0]; }

    function calculateStreak(completedDays) {
        if (!completedDays || !completedDays.length) return 0;
        const todayStr = formatDate(new Date());
        const yestStr = formatDate(new Date(Date.now() - 86400000));
        if (!completedDays.includes(todayStr) && !completedDays.includes(yestStr)) return 0;
        let check = completedDays.includes(todayStr) ? new Date() : new Date(Date.now() - 86400000);
        let streak = 0;
        while (completedDays.includes(formatDate(check))) {
            streak++;
            check = new Date(check.getTime() - 86400000);
        }
        return streak;
    }

    function getSkillLevel(p) {
        if (p < 30) return { label: 'Beginner', color: 'text-blue-500' };
        if (p < 70) return { label: 'Intermediate', color: 'text-orange-500' };
        return { label: 'Advanced', color: 'text-green-500' };
    }

    // ─── Modal ────────────────────────────────────────────────────────────────
    function showModal(title, message, onConfirm = null) {
        const c = document.getElementById('modal-container');
        c.classList.remove('hidden');
        c.classList.add('flex');
        c.innerHTML = `
            <div class="bg-card p-6 rounded-2xl border shadow-2xl max-w-sm w-full fade-in space-y-4">
                <h3 class="text-xl font-bold">${title}</h3>
                <p class="text-muted-foreground">${message}</p>
                <div class="flex gap-3 pt-2">
                    ${onConfirm ? `
                        <button id="m-cancel" class="flex-1 px-4 py-2 rounded-xl border hover:bg-accent transition-all font-medium">Cancel</button>
                        <button id="m-confirm" class="flex-1 px-4 py-2 rounded-xl bg-primary text-primary-foreground font-medium">Confirm</button>
                    ` : `
                        <button id="m-close" class="w-full px-4 py-2 rounded-xl bg-primary text-primary-foreground font-medium">OK</button>
                    `}
                </div>
            </div>`;
        const close = () => { c.classList.add('hidden'); c.classList.remove('flex'); };
        if (onConfirm) {
            document.getElementById('m-cancel').onclick = close;
            document.getElementById('m-confirm').onclick = () => { close(); onConfirm(); };
        } else {
            document.getElementById('m-close').onclick = close;
        }
    }
    window.showModal = showModal;

    // ─── Render ───────────────────────────────────────────────────────────────
    function render() {
        applyTheme();
        if (!dailyQuote) dailyQuote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
        const appEl = document.getElementById('app');

        if (state.loading) {
            appEl.innerHTML = `<div class="min-h-screen flex items-center justify-center w-full"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-primary"></div></div>`;
            return;
        }

        if (state.error) {
            appEl.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-4 w-full">
                    <div class="bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 p-6 rounded-2xl border border-red-200 dark:border-red-800 max-w-md text-center space-y-4">
                        <i data-lucide="alert-circle" size="48" class="mx-auto"></i>
                        <h2 class="text-xl font-bold">Something went wrong</h2>
                        <p>${state.error}</p>
                        <button onclick="location.reload()" class="bg-primary text-primary-foreground px-6 py-2 rounded-xl font-medium mr-2">Retry</button>
                        <button id="dismiss-error" class="text-sm text-muted-foreground hover:underline">Dismiss</button>
                    </div>
                </div>`;
            lucide.createIcons();
            document.getElementById('dismiss-error').onclick = () => { state.error = null; render(); };
            return;
        }

        if (!state.user) { renderLogin(appEl); return; }
        if (state.needsProfile) { renderProfileSetup(appEl); return; }

        appEl.innerHTML = `
            ${sidebarOpen ? `<div onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/50 z-40 lg:hidden"></div>` : ''}
            <aside class="${sidebarOpen ? 'flex' : 'hidden'} lg:flex w-72 border-r border-border flex-col p-6 gap-8 bg-card fixed lg:sticky top-0 h-screen z-50">
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-primary-foreground shadow-lg shadow-primary/20">
                            <i data-lucide="trophy" size="24"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold tracking-tight">GrowthTrack</h1>
                            <p class="text-[10px] text-muted-foreground uppercase tracking-widest font-bold">Level Up Your Life</p>
                        </div>
                    </div>
                    <button onclick="toggleSidebar(false)" class="lg:hidden p-2 hover:bg-accent rounded-lg">
                        <i data-lucide="x" size="20"></i>
                    </button>
                </div>
                <nav class="flex flex-col gap-2 flex-1">
                    ${navItem('dashboard', 'layout-dashboard', 'Dashboard')}
                    ${navItem('habits', 'check-circle-2', 'Habits')}
                    ${navItem('skills', 'trending-up', 'Skills')}
                    ${navItem('settings', 'settings', 'Settings')}
                </nav>
                <div class="space-y-4">
                    <div class="p-4 bg-accent/50 rounded-2xl flex items-center gap-3">
                        <div class="w-10 h-10 bg-primary/10 text-primary rounded-full flex items-center justify-center">
                            <i data-lucide="user" size="20"></i>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-bold truncate">${state.user.username || state.user.displayName || 'User'}</p>
                            <p class="text-[10px] text-muted-foreground uppercase tracking-wider">Free Plan</p>
                        </div>
                    </div>
                    <footer class="px-2 py-4 border-t space-y-3">
                        <div class="flex flex-wrap gap-x-4 gap-y-2 text-[10px] font-bold uppercase tracking-widest text-muted-foreground">
                            <button onclick="setActiveTab('terms')" class="hover:text-primary transition-colors">Terms</button>
                            <button onclick="setActiveTab('privacy')" class="hover:text-primary transition-colors">Privacy</button>
                            <button onclick="setActiveTab('settings')" class="hover:text-primary transition-colors">Contact</button>
                        </div>
                        <p class="text-[10px] text-muted-foreground/60">© 2026 GrowthTrack by Tamil Selvan M</p>
                    </footer>
                </div>
            </aside>
            <main class="flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto">
                <div class="max-w-6xl mx-auto">
                    <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                        <div>
                            <h2 class="text-3xl font-bold capitalize">${activeTab}</h2>
                            <p class="text-muted-foreground">${headerSubtext()}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="toggleTheme()" class="p-3 rounded-xl border bg-card hover:bg-accent transition-all">
                                <i data-lucide="${state.theme === 'light' ? 'moon' : 'sun'}" size="20"></i>
                            </button>
                            <button onclick="toggleSidebar(true)" class="lg:hidden p-3 rounded-xl border bg-card">
                                <i data-lucide="menu" size="20"></i>
                            </button>
                        </div>
                    </header>
                    <div class="fade-in">${renderTab()}</div>
                </div>
            </main>`;

        renderSupportFab();
        lucide.createIcons();
    }

    function navItem(id, icon, label) {
        const active = activeTab === id;
        return `<button onclick="setActiveTab('${id}')" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${active ? 'bg-primary text-primary-foreground shadow-lg shadow-primary/20' : 'text-muted-foreground hover:bg-accent hover:text-accent-foreground'}">
            <i data-lucide="${icon}" size="20"></i><span class="font-medium">${label}</span></button>`;
    }

    function headerSubtext() {
        const map = {
            dashboard: `Welcome back, ${state.user.username || 'User'}!`,
            habits: "Consistency is the key to success.",
            skills: "Master your craft one step at a time.",
            settings: "Manage your account and preferences.",
            terms: "Please read our terms of service.",
            privacy: "How we protect your personal data."
        };
        return map[activeTab] || '';
    }

    function renderTab() {
        switch (activeTab) {
            case 'dashboard': return renderDashboard();
            case 'habits':    return renderHabits();
            case 'skills':    return renderSkills();
            case 'settings':  return renderSettings();
            case 'terms':     return renderTerms();
            case 'privacy':   return renderPrivacy();
            default: return '';
        }
    }

    // ─── Dashboard ────────────────────────────────────────────────────────────
    function renderDashboard() {
        const today = formatDate(new Date());
        const doneToday = state.habits.filter(h => (h.completedDays || []).includes(today)).length;
        const total = state.habits.length;
        const habitPct = total ? (doneToday / total) * 100 : 0;
        const avgSkill = state.skills.length ? state.skills.reduce((a, s) => a + (s.progress || 0), 0) / state.skills.length : 0;

        return `<div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-primary text-primary-foreground rounded-2xl p-6 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-white/20 rounded-lg"><i data-lucide="check-circle-2" size="24"></i></div>
                        <span class="text-sm font-medium opacity-80">Today's Progress</span>
                    </div>
                    <h3 class="text-3xl font-bold">${doneToday}/${total}</h3>
                    <p class="text-sm opacity-80 mb-4">Habits completed today</p>
                    <div class="h-1.5 w-full bg-white/20 rounded-full">
                        <div class="h-full bg-white rounded-full transition-all duration-500" style="width:${habitPct}%"></div>
                    </div>
                </div>
                <div class="bg-orange-500 text-white rounded-2xl p-6 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 bg-white/20 rounded-lg"><i data-lucide="trending-up" size="24"></i></div>
                        <span class="text-sm font-medium opacity-80">Skill Growth</span>
                    </div>
                    <h3 class="text-3xl font-bold">${Math.round(avgSkill)}%</h3>
                    <p class="text-sm opacity-80 mb-4">Average skill level</p>
                    <div class="h-1.5 w-full bg-white/20 rounded-full">
                        <div class="h-full bg-white rounded-full transition-all duration-500" style="width:${avgSkill}%"></div>
                    </div>
                </div>
                <div class="bg-card text-card-foreground rounded-2xl p-6 shadow-sm border flex flex-col justify-center">
                    <div class="flex items-center gap-3 mb-4 text-muted-foreground">
                        <i data-lucide="quote" size="20"></i>
                        <span class="text-sm font-medium">Daily Motivation</span>
                    </div>
                    <p class="text-lg font-medium italic leading-relaxed">"${dailyQuote}"</p>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-card text-card-foreground rounded-2xl p-6 shadow-sm border">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold">Today's Habits</h3>
                        <button onclick="setActiveTab('habits')" class="text-primary text-sm font-medium hover:underline">View All</button>
                    </div>
                    <div class="space-y-4">
                        ${state.habits.length === 0 ? '<p class="text-muted-foreground text-center py-8">No habits added yet.</p>' :
                            state.habits.map(h => {
                                const done = (h.completedDays || []).includes(today);
                                const streak = calculateStreak(h.completedDays || []);
                                return `<div class="flex items-center justify-between p-3 rounded-xl border bg-accent/30">
                                    <div class="flex items-center gap-3">
                                        <div onclick="toggleHabit('${h.id}')" class="w-10 h-10 rounded-lg flex items-center justify-center transition-all cursor-pointer ${done ? 'text-primary-foreground' : 'bg-secondary text-muted-foreground'}" style="${done ? `background-color:${h.color}` : ''}">
                                            <i data-lucide="check-circle-2" size="20"></i>
                                        </div>
                                        <div>
                                            <p class="font-medium ${done ? 'line-through opacity-50' : ''}">${h.name}</p>
                                            <div class="flex items-center gap-1 text-xs text-orange-500 font-bold">
                                                <i data-lucide="flame" size="12"></i><span>${streak} day streak</span>
                                            </div>
                                        </div>
                                    </div>
                                    <button onclick="toggleHabit('${h.id}')" class="text-xs py-1.5 px-3 rounded-lg font-medium transition-all ${done ? 'bg-secondary text-secondary-foreground' : 'bg-primary text-primary-foreground'}">${done ? 'Undo' : 'Done'}</button>
                                </div>`;
                            }).join('')}
                    </div>
                </div>
                <div class="bg-card text-card-foreground rounded-2xl p-6 shadow-sm border">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold">Skill Progress</h3>
                        <button onclick="setActiveTab('skills')" class="text-primary text-sm font-medium hover:underline">View All</button>
                    </div>
                    <div class="space-y-6">
                        ${state.skills.length === 0 ? '<p class="text-muted-foreground text-center py-8">No skills added yet.</p>' :
                            state.skills.slice(0, 4).map(s => `
                                <div class="space-y-2">
                                    <div class="flex justify-between text-sm">
                                        <span class="font-medium">${s.name}</span>
                                        <span class="text-muted-foreground">${s.progress}%</span>
                                    </div>
                                    <div class="h-2 w-full bg-secondary rounded-full overflow-hidden">
                                        <div class="h-full transition-all duration-500" style="width:${s.progress}%;background-color:${s.color}"></div>
                                    </div>
                                </div>`).join('')}
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ─── Habits ───────────────────────────────────────────────────────────────
    function renderHabits() {
        const today = formatDate(new Date());
        return `<div class="space-y-6">
            <div class="bg-card text-card-foreground rounded-2xl p-6 shadow-sm border">
                <h3 class="text-lg font-bold mb-4">Add New Habit</h3>
                <div class="flex flex-col md:flex-row gap-4">
                    <input id="new-habit-name" type="text" placeholder="Habit name (e.g., Reading, Gym)" class="flex-1 px-4 py-2 rounded-xl border bg-background outline-none focus:ring-2 focus:ring-primary" />
                    <div class="flex gap-2 items-center">
                        ${COLORS.map(c => `<button onclick="selectHabitColor('${c}')" class="w-8 h-8 rounded-full border-2 transition-all habit-color-btn" style="background-color:${c};border-color:${state.selectedHabitColor === c ? 'currentColor' : 'transparent'}" data-color="${c}"></button>`).join('')}
                    </div>

    function renderProfileSetup(container) {
        container.innerHTML = `
            <div class="min-h-screen w-full flex items-center justify-center p-4 bg-accent/30">
                <div class="w-full max-w-md space-y-8 bg-card p-8 rounded-3xl border shadow-2xl fade-in">
                    <div class="text-center space-y-2">
                        <h1 class="text-3xl font-bold tracking-tight">Complete Profile</h1>
                        <p class="text-muted-foreground">Just one more step to get started</p>
                    </div>
                    <div class="space-y-4">
                        <div class="space-y-2"><label class="text-sm font-medium">Choose a Username</label>
                            <input id="profile-username" type="text" class="w-full px-4 py-3 rounded-xl border bg-background outline-none focus:ring-2 focus:ring-primary" placeholder="Your name" value="${auth.currentUser?.displayName || ''}" /></div>
                        <button onclick="handleCompleteProfile()" class="w-full bg-primary text-primary-foreground py-3 rounded-xl font-bold shadow-lg shadow-primary/20 hover:opacity-90 transition-all">Finish Setup</button>
                    </div>
                </div>
            </div>`;
        lucide.createIcons();
    }

    function setupRecaptcha() {
        if (window.recaptchaVerifier) return;
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'normal', callback: () => {} });
        window.recaptchaVerifier.render();
    }

    // ─── Auth Handlers ────────────────────────────────────────────────────────
    async function handleGoogleLogin(isLogin = true) {
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const snap = await getDoc(doc(db, 'users', user.uid));
            if (isLogin && !snap.exists()) {
                await signOut(auth);
                showModal("Account Not Found", "No account found. Please sign up first.");
                return;
            }
            if (!snap.exists()) {
                await setDoc(doc(db, 'users', user.uid), {
                    username: user.displayName || 'User',
                    email: user.email || '',
                    createdAt: new Date().toISOString()
                });
                showModal("Welcome!", "Account created successfully!");
            } else {
                showModal("Welcome back!", "Logged in successfully!");
            }
        } catch (err) {
            showModal("Google Auth Failed", err.message);
        }
    }

    async function handleEmailLogin() {
        const email = document.getElementById('email-input')?.value?.trim();
        const password = document.getElementById('password-input')?.value;
        if (!email || !password) return showModal("Missing Info", "Please fill all fields.");
        try {
            const result = await signInWithEmailAndPassword(auth, email, password);
            const snap = await getDoc(doc(db, 'users', result.user.uid));
            if (!snap.exists()) {
                await signOut(auth);
                showModal("Account Not Found", "Profile data missing. Please contact support.");
                return;
            }
            showModal("Welcome back!", "Logged in successfully!");
        } catch (err) {
            const msgs = {
                'auth/user-not-found': 'No account with this email. Please sign up.',
                'auth/wrong-password': 'Incorrect password. Please try again.',
                'auth/invalid-credential': 'Invalid email or password.',
                'auth/too-many-requests': 'Too many attempts. Please try again later.'
            };
            showModal("Login Failed", msgs[err.code] || err.message);
        }
    }

    async function handleEmailSignup() {
        const username = document.getElementById('signup-username')?.value?.trim();
        const email = document.getElementById('signup-email')?.value?.trim();
        const password = document.getElementById('signup-password')?.value;
        if (!username || !email || !password) return showModal("Missing Info", "Please fill all fields.");
        if (password.length < 6) return showModal("Weak Password", "Password must be at least 6 characters.");
        try {
            const cred = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, 'users', cred.user.uid), {
                username,
                email,
                createdAt: new Date().toISOString()
            });
            showModal("Welcome!", "Account created successfully!");
        } catch (err) {
            const msgs = {
                'auth/email-already-in-use': 'This email is already registered. Please log in.',
                'auth/invalid-email': 'Please enter a valid email address.',
                'auth/weak-password': 'Password must be at least 6 characters.'
            };
            showModal("Signup Failed", msgs[err.code] || err.message);
        }
    }

    async function handlePhoneLogin() {
        const code = document.getElementById('country-code')?.value;
        const number = document.getElementById('phone-input')?.value?.trim();
        if (!number) return showModal("Missing Info", "Please enter your phone number.");
        const country = COUNTRIES.find(c => c.code === code);
        if (number.length !== country.length) return showModal("Invalid Number", `Phone number for ${country.name} must be ${country.length} digits.`);
        try {
            phoneConfirmation = await signInWithPhoneNumber(auth, code + number, window.recaptchaVerifier);
            setLoginMode('otp');
            showModal("Code Sent", "Please check your phone for the verification code.");
        } catch (err) {
            showModal("Phone Login Failed", err.message);
            if (window.recaptchaVerifier) { window.recaptchaVerifier.clear(); window.recaptchaVerifier = null; }
            setLoginMode('phone');
        }
    }

    async function handleVerifyOtp() {
        const otp = document.getElementById('otp-input')?.value?.trim();
        if (!otp || otp.length !== 6) return showModal("Missing Info", "Please enter the 6-digit code.");
        try {
            const result = await phoneConfirmation.confirm(otp);
            const user = result.user;
            const snap = await getDoc(doc(db, 'users', user.uid));
            if (state.isPhoneSignup && !snap.exists()) {
                await setDoc(doc(db, 'users', user.uid), {
                    username: 'User ' + user.phoneNumber.slice(-4),
                    phoneNumber: user.phoneNumber,
                    email: '',
                    createdAt: new Date().toISOString()
                });
                showModal("Welcome!", "Account created successfully!");
            } else if (!state.isPhoneSignup && !snap.exists()) {
                await signOut(auth);
                showModal("Account Not Found", "No account with this number. Please sign up first.");
            } else {
                showModal("Welcome back!", "Logged in successfully!");
            }
        } catch (err) {
            showModal("Invalid OTP", "The code entered is incorrect or expired.");
        }
    }

    async function handleCompleteProfile() {
        const username = document.getElementById('profile-username')?.value?.trim();
        if (!username) return showModal("Missing Info", "Please enter a username.");
        try {
            await setDoc(doc(db, 'users', auth.currentUser.uid), {
                username,
                email: auth.currentUser.email || '',
                phoneNumber: auth.currentUser.phoneNumber || '',
                createdAt: new Date().toISOString()
            });
            state.needsProfile = false;
            // onAuthStateChanged will re-trigger and handle state
        } catch (err) {
            showModal("Error", "Could not save profile: " + err.message);
        }
    }

    // ─── Event Handlers ───────────────────────────────────────────────────────
    async function logout() {
        try { await signOut(auth); } catch (err) { showModal("Logout Failed", err.message); }
    }

    function setActiveTab(tab) { activeTab = tab; sidebarOpen = false; render(); }
    function toggleSidebar(open) { sidebarOpen = open; render(); }
    function toggleTheme() { state.theme = state.theme === 'light' ? 'dark' : 'light'; render(); }
    function toggleSupport(open) { state.supportOpen = open; render(); }
    function setLoginMode(mode) { loginMode = mode; render(); }
    function updateSuggestion(val) { state.suggestion = val; }

    function selectHabitColor(color) {
        state.selectedHabitColor = color;
        document.querySelectorAll('.habit-color-btn').forEach(b => {
            b.style.borderColor = b.dataset.color === color ? 'currentColor' : 'transparent';
        });
    }

    function selectSkillColor(color) {
        state.selectedSkillColor = color;
        document.querySelectorAll('.skill-color-btn').forEach(b => {
            b.style.borderColor = b.dataset.color === color ? 'currentColor' : 'transparent';
        });
    }

    async function handleAddHabit() {
        const input = document.getElementById('new-habit-name');
        const name = input?.value?.trim();
        if (!name) return showModal("Missing Info", "Please enter a habit name.");
        try {
            await addDoc(collection(db, 'users', auth.currentUser.uid, 'habits'), {
                name,
                completedDays: [],
                createdAt: new Date().toISOString(),
                color: state.selectedHabitColor || '#3b82f6'
            });
            if (input) input.value = '';
            showModal("Success", "Habit added successfully!");
        } catch (err) {
            showModal("Error", "Could not add habit: " + err.message);
        }
    }

    async function toggleHabit(id, date = formatDate(new Date())) {
        const habit = state.habits.find(h => h.id === id);
        if (!habit) return;
        const days = [...(habit.completedDays || [])];
        const idx = days.indexOf(date);
        if (idx > -1) days.splice(idx, 1); else days.push(date);
        try {
            await updateDoc(doc(db, 'users', auth.currentUser.uid, 'habits', id), { completedDays: days });
        } catch (err) {
            showModal("Error", "Could not update habit: " + err.message);
        }
    }

    async function deleteHabit(id) {
        showModal("Delete Habit", "Are you sure you want to delete this habit?", async () => {
            try { await deleteDoc(doc(db, 'users', auth.currentUser.uid, 'habits', id)); }
            catch (err) { showModal("Error", "Could not delete habit: " + err.message); }
        });
    }

    async function editHabit(id) {
        const habit = state.habits.find(h => h.id === id);
        if (!habit) return;
        const newName = prompt("Enter new habit name:", habit.name);
        if (newName === null) return;
        const trimmed = newName.trim();
        if (!trimmed) return showModal("Error", "Name cannot be empty.");
        try {
            await updateDoc(doc(db, 'users', auth.currentUser.uid, 'habits', id), { name: trimmed });
            showModal("Success", "Habit updated!");
        } catch (err) {
            showModal("Error", "Could not update habit: " + err.message);
        }
    }

    async function handleAddSkill() {
        const input = document.getElementById('new-skill-name');
        const name = input?.value?.trim();
        if (!name) return showModal("Missing Info", "Please enter a skill name.");
        try {
            await addDoc(collection(db, 'users', auth.currentUser.uid, 'skills'), {
                name,
                progress: 0,
                createdAt: new Date().toISOString(),
                color: state.selectedSkillColor || '#3b82f6'
            });
            if (input) input.value = '';
            showModal("Success", "Skill added successfully!");
        } catch (err) {
            showModal("Error", "Could not add skill: " + err.message);
        }
    }

    async function updateSkillProgress(id, progress) {
        const p = Math.max(0, Math.min(100, parseInt(progress) || 0));
        try {
            await updateDoc(doc(db, 'users', auth.currentUser.uid, 'skills', id), { progress: p });
        } catch (err) {
            showModal("Error", "Could not update skill: " + err.message);
        }
    }

    async function deleteSkill(id) {
        showModal("Delete Skill", "Are you sure you want to delete this skill?", async () => {
            try { await deleteDoc(doc(db, 'users', auth.currentUser.uid, 'skills', id)); }
            catch (err) { showModal("Error", "Could not delete skill: " + err.message); }
        });
    }

    async function editSkill(id) {
        const skill = state.skills.find(s => s.id === id);
        if (!skill) return;
        const newName = prompt("Enter new skill name:", skill.name);
        if (newName === null) return;
        const trimmed = newName.trim();
        if (!trimmed) return showModal("Error", "Name cannot be empty.");
        try {
            await updateDoc(doc(db, 'users', auth.currentUser.uid, 'skills', id), { name: trimmed });
            showModal("Success", "Skill updated!");
        } catch (err) {
            showModal("Error", "Could not update skill: " + err.message);
        }
    }

    async function resetData() {
        showModal("Reset All Data", "This will permanently delete ALL your habits and skills. Are you sure?", async () => {
            try {
                for (const h of state.habits) await deleteDoc(doc(db, 'users', auth.currentUser.uid, 'habits', h.id));
                for (const s of state.skills) await deleteDoc(doc(db, 'users', auth.currentUser.uid, 'skills', s.id));
                showModal("Done", "All data has been reset.");
            } catch (err) {
                showModal("Error", "Reset failed: " + err.message);
            }
        });
    }

    function handleSendSuggestion() {
        const suggestion = state.suggestion?.trim();
        if (!suggestion) return showModal("Missing Info", "Please type a suggestion first.");
        const url = `https://wa.me/916383503875?text=${encodeURIComponent('Hello, I have a suggestion for GrowthTrack: ' + suggestion)}`;
        window.open(url, '_blank');
        state.showSuccess = true;
        state.suggestion = '';
        render();
        setTimeout(() => { state.showSuccess = false; render(); }, 3000);
    }

    // ─── Global Exports ───────────────────────────────────────────────────────
    Object.assign(window, {
        toggleSidebar, setActiveTab, toggleTheme, toggleSupport, setLoginMode,
        handleGoogleLogin, handleEmailLogin, handleEmailSignup,
        handlePhoneLogin, handleVerifyOtp, handleCompleteProfile,
        logout, handleAddHabit, selectHabitColor, toggleHabit, deleteHabit, editHabit,
        handleAddSkill, selectSkillColor, updateSkillProgress, deleteSkill, editSkill,
        resetData, updateSuggestion, handleSendSuggestion
    });

    // ─── Boot ─────────────────────────────────────────────────────────────────
    applyTheme();
    render(); // Shows loading spinner — onAuthStateChanged will update
    </script>
</body>
</html>
